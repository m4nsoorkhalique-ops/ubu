name: Ubuntu-Desktop-RDP

on:
workflow_dispatch:

jobs:
summon-pc:
runs-on: ubuntu-latest

steps:
  - name: Update system
    run: |
      sudo apt update
      sudo apt upgrade -y

  - name: Install XFCE Desktop and XRDP
    run: |
      sudo apt install -y xfce4 xfce4-goodies xrdp
      echo "xfce4-session" > ~/.xsession
      sudo systemctl enable xrdp
      sudo systemctl start xrdp

  - name: Create RDP User
    run: |
      sudo useradd -m rdpuser
      echo "rdpuser:MySecurePass123!" | sudo chpasswd
      sudo usermod -aG sudo rdpuser

  - name: Allow XRDP through firewall
    run: |
      sudo ufw allow 3389
      sudo ufw --force enable

  - name: Install Tailscale
    run: |
      curl -fsSL https://tailscale.com/install.sh | sh

  - name: Connect Tailscale
    run: |
      sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-ubuntu --reset

  - name: Show Connection Info
    run: |
      TS_IP=$(tailscale ip -4)
      echo "=========================================="
      echo "UBUNTU RDP READY"
      echo "CONNECT TO: $TS_IP:3389"
      echo "USERNAME: rdpuser"
      echo "PASSWORD: MySecurePass123!"
      echo "=========================================="
      while true; do sleep 60; done